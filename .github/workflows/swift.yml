name: OVK Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build OVK
        run: |
          xcodebuild \
            -project OVK/OVK.xcodeproj \
            -scheme OVK \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            build
